<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — El Corte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Epilogue', -apple-system, system-ui, sans-serif;
      background: #fcfcfb;
      color: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .offline-container {
      text-align: center;
      max-width: 400px;
    }

    .offline-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 2rem;
      opacity: 0.2;
    }

    .offline-icon svg {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: -0.01em;
      margin: 0 0 1rem;
      color: #0a0a0a;
    }

    p {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.7;
      color: #6b6b6b;
      margin: 0 0 2rem;
    }

    button {
      font-family: 'Epilogue', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #fcfcfb;
      background: #0a0a0a;
      padding: 1.1rem 2.5rem;
      border: 1px solid #0a0a0a;
      cursor: pointer;
      transition: all 300ms cubic-bezier(.25, .1, .25, 1);
    }

    button:hover {
      background: transparent;
      color: #0a0a0a;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
        <line x1="1" y1="1" x2="23" y2="23" stroke-width="2"></line>
      </svg>
    </div>

    <h1>Sin conexión</h1>
    <p>Conéctate a internet para continuar navegando.</p>
    
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
